<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BELLARA AI - Advanced</title>
    <style>
        :root { --accent: #00d2ff; --bg: #f4f7f9; --ai-bubble: #ffffff; --user-bubble: #e3f2fd; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; flex-direction: column; height: 100vh; }

        /* Header */
        header { background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-top: 4px solid var(--accent); }
        .logo { font-weight: bold; font-size: 20px; color: #333; }
        .clear-btn { background: #ff4b2b; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 12px; }

        /* Chat Display */
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 85%; padding: 15px; border-radius: 12px; position: relative; line-height: 1.6; }
        .user { align-self: flex-end; background: var(--user-bubble); color: #1565c0; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--ai-bubble); color: #333; border-bottom-left-radius: 2px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

        /* Real Code Copy Column */
        .code-container {
            background: #1e1e1e;
            color: #dcdcdc;
            border-radius: 8px;
            margin-top: 10px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .code-header {
            background: #333;
            padding: 5px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #aaa;
        }
        .copy-code-btn {
            background: #444;
            color: #eee;
            border: none;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .copy-code-btn:hover { background: var(--accent); }
        pre { margin: 0; padding: 15px; overflow-x: auto; font-family: 'Consolas', monospace; }

        /* Input Area */
        .input-area { background: white; padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #ddd; outline: none; font-size: 16px; }
        .circle-btn { width: 45px; height: 45px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        #sendBtn { background: var(--accent); color: white; }
        #voiceBtn { background: #f0f0f0; color: #555; }
    </style>
</head>
<body>

<header>
    <div class="logo">BELLARA AI</div>
    <button class="clear-btn" onclick="clearStorage()">Clear Chat</button>
</header>

<div id="chat-window"></div>

<div class="input-area">
    <button class="circle-btn" id="voiceBtn">🎤</button>
    <input type="text" id="userInput" placeholder="Type or speak to BELLARA...">
    <button class="circle-btn" id="sendBtn">➤</button>
</div>

<script type="importmap">
  { "imports": { "@google/generative-ai": "https://esm.run/@google/generative-ai" } }
</script>

<script type="module">
  import { GoogleGenerativeAI } from "@google/generative-ai";

  const API_KEY = "AIzaSyCGd-Q7_P9GkXvUeUEp1bIP6SdVHcNvXOI"; // Replace with your secret key
  const genAI = new GoogleGenerativeAI(API_KEY);
  const model = genAI.getGenerativeModel({ 
      model: "gemini-3-flash-preview",
      systemInstruction: "Your name is BELLARA AI. When you provide code, wrap it in backticks like this: ```code here```."
  });

  const chatWindow = document.getElementById('chat-window');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const voiceBtn = document.getElementById('voiceBtn');

  // --- INTERNAL STORAGE LOGIC ---
  let history = JSON.parse(localStorage.getItem('bellara_history')) || [];

  function renderChat() {
      chatWindow.innerHTML = '';
      history.forEach(item => {
          const msgDiv = document.createElement('div');
          msgDiv.className = `message ${item.role}`;
          
          // Logic to split text from code blocks
          const parts = item.text.split(/```/);
          parts.forEach((part, index) => {
              if (index % 2 === 1) { // This is a code block
                  const codeContainer = document.createElement('div');
                  codeContainer.className = 'code-container';
                  codeContainer.innerHTML = `
                      <div class="code-header">
                          <span>Code</span>
                          <button class="copy-code-btn" onclick="copyText(this)">Copy</button>
                      </div>
                      <pre><code>${part.trim()}</code></pre>
                  `;
                  msgDiv.appendChild(codeContainer);
              } else {
                  const textSpan = document.createElement('span');
                  textSpan.innerText = part;
                  msgDiv.appendChild(textSpan);
              }
          });
          chatWindow.appendChild(msgDiv);
      });
      chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  // Global helper for copying code
  window.copyText = (btn) => {
      const code = btn.parentElement.nextElementSibling.innerText;
      navigator.clipboard.writeText(code);
      btn.innerText = "Copied!";
      setTimeout(() => btn.innerText = "Copy", 2000);
  };

  window.clearStorage = () => {
      localStorage.removeItem('bellara_history');
      history = [];
      renderChat();
  };

  // --- API INTERACTION ---
  async function talkToAI() {
      const text = userInput.value.trim();
      if (!text) return;

      history.push({ role: 'user', text: text });
      renderChat();
      userInput.value = '';

      try {
          const result = await model.generateContent(text);
          const response = await result.response;
          history.push({ role: 'ai', text: response.text() });
          localStorage.setItem('bellara_history', JSON.stringify(history));
          renderChat();
      } catch (err) {
          console.error(err);
      }
  }

  sendBtn.onclick = talkToAI;
  userInput.onkeypress = (e) => { if(e.key === 'Enter') talkToAI(); };

  // --- VOICE TO TEXT ---
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  voiceBtn.onclick = () => {
      recognition.start();
      voiceBtn.innerText = "📡";
  };
  recognition.onresult = (e) => {
      userInput.value = e.results[0][0].transcript;
      voiceBtn.innerText = "🎤";
      talkToAI();
  };

  renderChat();
</script>

</body>
</html>
